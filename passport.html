<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ROJAK PASSPORT</title>

<style>

/* GLOBAL */
body {
  margin: 0;
  background: #0b1f17;
  color: #F2EBD9;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
  opacity: 0;
  transition: opacity 1s ease;
}

body.loaded {
  opacity: 1;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 10%;
}

.hero h1 {
  font-size: 100px;
  color: #D4A843;
  margin: 0;
  letter-spacing: -2px;
}

.hero p {
  font-size: 22px;
  opacity: 0.6;
}

/* SECTION */
.section {
  height: 120vh;
  display: flex;
  align-items: center;
  padding: 0 10%;
  position: relative;
}

/* TEXT */
.text {
  max-width: 600px;
}

#title {
  font-size: 70px;
  color: #D4A843;
  opacity: 0;
  transform: translateY(40px);
  transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
  letter-spacing: -2px;
  font-weight: 600;
}

#desc {
  opacity: 0;
  transform: translateY(30px);
  transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
}

.text h2 {
  font-size: 70px;
  color: #D4A843;
  margin: 0;
}

.text p {
  opacity: 0.7;
}

/* SCROLL ANIMATION */
.section {
  opacity: 0;
  transform: translateY(50px);
  transition: 0.6s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

/* STAMP */
.stamp {
  margin-top: 30px;
  border: 2px solid #C0392B;
  box-shadow: 0 0 20px rgba(192, 57, 43, 0.3);
  font-weight: bold;
  letter-spacing: 2px;
  padding: 12px 25px;
  display: inline-block;
  transform: rotate(-8deg) scale(0.8);
  opacity: 0;
  transition: 0.4s;
}

.stamp.active {
  opacity: 1;
  transform: rotate(-8deg) scale(1);
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>ROJAK PASSPORT</h1>
  <p>Une expérience immersive au Pays de Gex</p>
</section>

<!-- SECTION 1 -->
<section class="section">
  <div class="text">
    <h2 id="title">Singapore</h2>
    <p id="desc">Une entrée inspirée des hawker centers.</p>
    <div class="stamp" id="stamp1">APPROVED</div>
  </div>
</section>

<!-- SECTION 2 -->
<section class="section">
  <div class="text">
    <h2>Street Food</h2>
    <p>Des saveurs authentiques, modernes.</p>
  </div>
</section>

<!-- SECTION 3 -->
<section class="section">
  <div class="text">
    <h2>Rooftop</h2>
    <p>Sunset. Alpes. Expérience.</p>
  </div>
</section>

<!-- SECTION 4 -->
<section class="section">
  <div class="text">
    <h2>Merlion Beer</h2>
    <p>Brassée localement. Signature.</p>
  </div>
</section>

<script>

/* LOAD + ANIMATION SEQUENTIELLE */
window.addEventListener("load", () => {

  document.body.classList.add("loaded");

  setTimeout(() => {
    document.getElementById("title").style.opacity = 1;
    document.getElementById("title").style.transform = "translateY(0)";
  }, 200);

  setTimeout(() => {
    document.getElementById("desc").style.opacity = 1;
    document.getElementById("desc").style.transform = "translateY(0)";
  }, 800);

  setTimeout(() => {
    document.getElementById("stamp1").classList.add("active");
  }, 1600);

});

/* SCROLL EFFECT */
const sections = document.querySelectorAll('.section');

function reveal() {
  sections.forEach(section => {
    const top = section.getBoundingClientRect().top;
    if (top < window.innerHeight * 0.75) {
      section.classList.add('visible');
    }
  });
}

window.addEventListener('scroll', reveal);
reveal();

</script>

</body>
</html>
