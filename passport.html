<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>ROJAK PASSPORT</title>

  <style>
    body {
      margin: 0;
      background: #0f1f17;
      color: #F2EBD9;
      font-family: Arial, sans-serif;
    }

    section {
      height: 100vh;
      display: flex;
      align-items: center;
      padding: 60px;
    }

    h1 {
      font-size: 60px;
      color: #D4A843;
    }

    h2 {
      color: #D4A843;
    }

    img {
      width: 50%;
      object-fit: cover;
    }

    .content {
      width: 50%;
      padding: 40px;
    }

    .stamp {
      border: 2px solid red;
      display: inline-block;
      padding: 10px;
      margin-top: 20px;
      transform: rotate(-10deg);
    }
  </style>
</head>

<body>

<!-- HERO -->
<section>
  <div>
    <h1>ROJAK PASSPORT</h1>
    <p>Une expérience immersive au Pays de Gex</p>
  </div>
</section>

<!-- PAGE 1 -->
<section>
  <img src="ton-image-1.png">
  <div class="content">
    <h2>Entrée Singapour</h2>
    <p>Bienvenue chez Rojak.</p>
    <div class="stamp">APPROVED</div>
  </div>
</section>

<!-- PAGE 2 -->
<section>
  <img src="ton-image-2.png">
  <div class="content">
    <h2>Street Food</h2>
    <p>Saveurs d’Asie modernes</p>
  </div>
</section>

<!-- PAGE 3 -->
<section>
  <img src="ton-image-3.png">
  <div class="content">
    <h2>Rooftop</h2>
    <p>Vue Alpes + sunset</p>
  </div>
</section>

</body>
</html>
