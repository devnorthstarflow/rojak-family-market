<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ROJAK PASSPORT</title>

<style>

body {
  margin: 0;
  background: #0b1f17;
  color: #F2EBD9;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 10%;
}

.hero h1 {
  font-size: 100px;
  color: #D4A843;
  margin: 0;
  letter-spacing: -2px;
}

.hero p {
  font-size: 22px;
  opacity: 0.6;
}

/* SECTION */
.section {
  height: 120vh;
  display: flex;
  align-items: center;
  padding: 0 10%;
  position: relative;
}

/* TEXTE */
.text {
  max-width: 600px;
}

.text h2 {
  font-size: 70px;
  margin: 0;
  color: #D4A843;
  transform: translateY(50px);
  opacity: 0;
  transition: 0.6s ease;
}

.text p {
  opacity: 0;
  transform: translateY(30px);
  transition: 0.6s ease;
}

/* APPARITION */
.visible h2,
.visible p {
  opacity: 1;
  transform: translateY(0);
}

/* STAMP */
.stamp {
  margin-top: 30px;
  border: 2px solid #C0392B;
  padding: 12px 25px;
  display: inline-block;
  transform: rotate(-8deg) scale(0.8);
  opacity: 0;
  transition: 0.3s;
}

.stamp.active {
  opacity: 1;
  transform: rotate(-8deg) scale(1);
}

/* BOUTON */
button {
  margin-top: 30px;
  padding: 12px 25px;
  border: 1px solid #D4A843;
  background: transparent;
  color: #D4A843;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #D4A843;
  color: black;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>ROJAK PASSPORT</h1>
  <p>Une expérience immersive au Pays de Gex</p>
</section>

<!-- SECTION 1 -->
<section class="section">
  <div class="text">
    <h2>Singapore</h2>
    <p>Une entrée inspirée des hawker centers.</p>

    <div class="stamp" id="stamp1">APPROVED</div>
    <button onclick="stamp('stamp1')">Stamp</button>
  </div>
</section>

<!-- SECTION 2 -->
<section class="section">
  <div class="text">
    <h2>Street Food</h2>
    <p>Des saveurs authentiques, modernes.</p>
  </div>
</section>

<!-- SECTION 3 -->
<section class="section">
  <div class="text">
    <h2>Rooftop</h2>
    <p>Sunset. Alpes. Expérience.</p>
  </div>
</section>

<!-- SECTION 4 -->
<section class="section">
  <div class="text">
    <h2>Merlion Beer</h2>
    <p>Brassée localement. Signature.</p>
  </div>
</section>

<script>

// SCROLL ANIMATION (APPLE STYLE)
const sections = document.querySelectorAll('.section');

function reveal() {
  sections.forEach(section => {
    const top = section.getBoundingClientRect().top;
    if (top < window.innerHeight * 0.75) {
      section.classList.add('visible');
    }
  });
}

window.addEventListener('scroll', reveal);
reveal();

// STAMP
function stamp(id) {
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
